# Configuração do projeto Supabase — Valor de Terras
# https://supabase.com/docs/guides/cli/config
project_id = "valor-de-terras"

[api]
enabled = true
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "https://valor-de-terras.github.io"
additional_redirect_urls = [
  "https://valor-de-terras.github.io",
  "http://localhost:5173",
  "http://localhost:4178",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = true
minimum_password_length = 8

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true

[functions.appraise]
enabled = true
verify_jwt = true

[functions.generate-report]
enabled = true
verify_jwt = true

[functions.report-link]
enabled = true
verify_jwt = true

[functions.submit-signed-report]
enabled = true
verify_jwt = true

[functions.admin-create-technician]
enabled = true
verify_jwt = true

[functions.admin-reset-password]
enabled = true
verify_jwt = true
